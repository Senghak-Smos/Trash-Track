  </head>
  <body>
    <div class="container">
      <div class="nav-bar">
        <div class="logo"><img src="Image/garbage-truck.png" alt="Logo" /></div>
        <div class="logo1">TrashTrack</div>
        
        <div class="menu-toggle" id="mobile-menu">
          <i class="fa-solid fa-bars"></i>
        </div>

        <ul class="nav-link" id="nav-menu">
          <li class="men"><a href="#home">ទំព័រដើម</a></li>

          <li class="lang-logo"><a href="" style="color: rgb(7, 7, 248);"><i class="bi bi-globe"></i></a></li>
          <li class="lang-ch">
            <select class="form-select" id="lang-select_up">
              <option value="upload_image.html" selected>អង់គ្លេស</option>
              <option value="upload_image_khmer.html">ខ្មែរ</option>
            </select>
          </li>
        </ul>
      </div>

      <div class="first-title">
        <div class="re">
            <h1>រាយការណ៍អំពីបញ្ហាសំរាម</h1>
            <p>1. ចំណុចទី១ ( ជ្រើសរើសរូបភាព )</p>
        </div>
        <div class="container-title">
          <label for="imageinput" style="cursor: pointer; display: block; padding: 20px;">
            <img id="imagepreview" src="Image/upload.png" alt="Upload" class="upload-img-preview">
            <h4>ជ្រើសរើសរូបភាព or <span style="color: #007bff; text-decoration: underline;">Browse</span></h4>
            <p style="margin-bottom: 0;">គាំទ្រប្រភេទរូបភាព : JPG, PNG, JPEG, WEBP</p>
          </label>
          <input type="file" style="display: none" accept="image/*" id="imageinput">
        </div>
        
        <div class="button-two">
            <div class="back">
              <a href="index.html"><button>&larr;</button></a>
            </div>
            <div class="back">
              <a href="droplocation_khmer.html"><button>បន្ទាប់</button></a>
            </div>
        </div>
        <br><br>

        <div class="re steps-instructions">
            <h1>1. ចំណុចទី១ ( ជ្រើសរើសរូបភាព )</h1>
            <ul>
                <li>ថតរូបបញ្ហាសំរាមនៅក្នុងតំបន់របស់អ្នក.</li><br>
                <li>ផ្ញើ “រូបភាព”</li><br>
                <li>ចុច “បន្ទាប់”.</li>
            </ul>
        </div>
      </div>
    </div>

    <div class="footer">
        <p>&copy; Built for country to help environment clean.</p>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const mobileMenu = document.getElementById("mobile-menu");
        const navMenu = document.getElementById("nav-menu");
        const menuIcon = mobileMenu.querySelector("i");

        mobileMenu.addEventListener("click", function () {
          navMenu.classList.toggle("active");

          if (navMenu.classList.contains("active")) {
            menuIcon.classList.remove("fa-bars");
            menuIcon.classList.add("fa-xmark");
          } else {
            menuIcon.classList.remove("fa-xmark");
            menuIcon.classList.add("fa-bars");
          }
        });
      });
    </script>
  </body>
</html>
