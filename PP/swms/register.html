<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #16a34a 0%, #047857 50%, #065f46 100%);
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: white;
            padding: 15px 30px;
        }

        .logo {
            font-size: 25px;
            font-weight: bold;
            font-family: cursive;
            padding: 1px;
            color: #16a34a;
        }

        .nav-link {
            list-style: none;
            display: flex;
        }

        .nav-link li {
            margin-left: 20px;
        }

        .nav-link a {
            text-decoration: none;
            font-size: 18px;
            color: black;
            transition: 0.3s;
        }

        #home a { color: green; transition: 0.3s; }
        #home:hover { transform: translateY(-2px); }
        #home a:hover { color: lightgreen; transform: translateY(-2px); }

        #login a {
            background-color: white;
            border: 1px solid gainsboro;
            border-radius: 10px;
            padding: 8px 15px;
        }
        #login:hover { transform: translateY(-2px); }
        #login a:hover { background-color: #16a34a; border: 1px solid gainsboro; color: white; }

        #register a {
            background-color: #16a34a;
            border: 1px solid gainsboro;
            color: white;
            border-radius: 10px;
            padding: 8px 15px;
            transition: 0.3s;
        }
        #register:hover { transform: translateY(-2px); }
        #register a:hover { background-color: white; border: 1px solid gainsboro; color: black; }

        form {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px 20px 60px;
        }

        .form-container {
            background: #ffffff;
            border-radius: 20px;
            width: 480px;
            padding: 40px 38px 36px;
            box-shadow:
                0 4px 6px rgba(0,0,0,0.04),
                0 20px 60px rgba(0,0,0,0.18),
                0 0 0 1px rgba(255,255,255,0.6) inset;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #16a34a, #34d399, #059669);
            border-radius: 20px 20px 0 0;
        }

        /* ── HEADING ── */
        .form-container h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 26px;
            font-weight: 700;
            color: #064e3b;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
        }

        .form-container h2 span {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .form-container div.information > div {
            margin-bottom: 18px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            letter-spacing: 0.02em;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            border-color: #16a34a;
            background: #fff;
            box-shadow: 0 0 0 3.5px rgba(22, 163, 74, 0.14);
        }

        input:valid:not(:placeholder-shown) {
            border-color: #34d399;
            background: #f0fdf4;
        }

        .divider {
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 24px 0 20px;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 0 !important;
        }

        button {
            padding: 11px 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex: 1;
        }

        .reset {
            background-color: #f3f4f6;
            color: #374151;
            border: 1.5px solid #e5e7eb;
            flex: 0.55;
        }

        .reset:hover {
            background-color: #fee2e2;
            border-color: #fca5a5;
            color: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
        }

        .submit {
            background: linear-gradient(135deg, #16a34a, #059669);
            color: white;
            flex: 1;
            box-shadow: 0 4px 14px rgba(22, 163, 74, 0.35);
        }

        .submit:hover {
            background: linear-gradient(135deg, #15803d, #047857);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.45);
        }

        .submit:active,
        .reset:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #6b7280;
        }

        .login-link a {
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="nav-bar">
        <div class="logo">SmartWaste</div>

        <ul class="nav-link">
            <li id="home"><a href="index.html">Home</a></li>
            <li id="login"><a href="#">Login</a></li>
            <li id="register"><a href="register.html">Register</a></li>
        </ul>
    </div>

    <form action="/register-form.html" method="post">

        <div class="form-container">

            <h2>
                <span></span>
                Create your account
            </h2>

            <div class="information">

                <div class="name-container">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" placeholder="Full Name" required minlength="5" maxlength="50">
                </div>

                <div class="email-container">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="urname@example.com" required>
                </div>

                <div class="password-container">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password"
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" minlength="8"
                        placeholder="8-12 chars, uppercase &amp; number"
                        title="Must contain Lowercase Uppercase and Number">
                </div>

                <div class="repeat-password-container">
                    <label for="repeat-password">Repeat Password</label>
                    <input type="password" name="repeat-password" id="repeat-password"
                        placeholder="Re-enter your password" required>
                </div>

                <hr class="divider">

                <div class="button-container">
                    <button class="reset" type="reset">Reset</button>
                    <button class="submit" type="submit">Create Account</button>
                </div>

                <p class="login-link">Already have an account? <a href="signin.html">Sign in</a></p>
            </div>
        </div>
    </form>
</body>

</html>
