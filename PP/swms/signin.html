<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #16a34a 0%, #047857 50%, #065f46 100%);
            min-height: 100vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── NAV BAR ── */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: white;
            padding: 15px 30px;
        }

        .logo {
            font-size: 25px;
            font-weight: bold;
            font-family: cursive;
            padding: 1px;
            color: #16a34a;
        }

        .nav-link {
            list-style: none;
            display: flex;
        }

        .nav-link li { margin-left: 20px; }

        .nav-link a {
            text-decoration: none;
            font-size: 18px;
            color: black;
            transition: 0.3s;
        }

        #home a { color: green; transition: 0.3s; }
        #home:hover { transform: translateY(-2px); }
        #home a:hover { color: lightgreen; }

        #login a {
            background-color: #16a34a;
            border: 1px solid gainsboro;
            color: white;
            border-radius: 10px;
            padding: 8px 15px;
            transition: 0.3s;
        }
        #login:hover { transform: translateY(-2px); }
        #login a:hover { background-color: white; color: black; }

        #register a {
            background-color: white;
            border: 1px solid gainsboro;
            border-radius: 10px;
            padding: 8px 15px;
            transition: 0.3s;
        }
        #register:hover { transform: translateY(-2px); }
        #register a:hover { background-color: #16a34a; color: white; }

        /* ── FORM WRAPPER ── */
        form {
            display: flex;
            justify-content: center;
            padding: 70px 20px 60px;
        }

        /* ── FORM CONTAINER ── */
        .form-container {
            background: #ffffff;
            border-radius: 20px;
            width: 480px;
            padding: 40px 38px 36px;
            box-shadow:
                0 4px 6px rgba(0,0,0,0.04),
                0 20px 60px rgba(0,0,0,0.18);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #16a34a, #34d399, #059669);
            border-radius: 20px 20px 0 0;
        }

        /* ── HEADING ── */
        .form-container h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 26px;
            font-weight: 700;
            color: #064e3b;
            text-align: center;
            margin-bottom: 6px;
        }

        .form-subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 32px;
        }

        /* ── FIELD GROUPS ── */
        .information > div {
            margin-bottom: 18px;
        }

        /* ── LABELS ── */
        label {
            display: block;
            margin-bottom: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        /* ── INPUTS ── */
        input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        input::placeholder { color: #9ca3af; }

        input:focus {
            border-color: #16a34a;
            background: #fff;
            box-shadow: 0 0 0 3.5px rgba(22, 163, 74, 0.14);
        }

        input:valid:not(:placeholder-shown) {
            border-color: #34d399;
            background: #f0fdf4;
        }

        /* ── DIVIDER ── */
        .divider {
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 24px 0 20px;
        }

        /* ── SUBMIT BUTTON ── */
        .submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 15px;
            background: linear-gradient(135deg, #16a34a, #059669);
            color: white;
            box-shadow: 0 4px 14px rgba(22, 163, 74, 0.35);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .submit:hover {
            background: linear-gradient(135deg, #15803d, #047857);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.45);
        }

        .submit:active { transform: translateY(0); }

        /* ── REGISTER LINK ── */
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #6b7280;
        }

        .register-link a {
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover { text-decoration: underline; }
    </style>
</head>

<body>

    <div class="nav-bar">
        <div class="logo">SmartWaste</div>
        <ul class="nav-link">
            <li id="home"><a href="index.html">Home</a></li>
            <li id="login"><a href="login.html">Login</a></li>
            <li id="register"><a href="register.html">Register</a></li>
        </ul>
    </div>

    <form action="/login-form.html" method="post">
        <div class="form-container">

            <h2>Welcome back</h2>
            <p class="form-subtitle">Sign in to your SmartWaste account</p>

            <div class="information">

                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password" required>
                </div>

                <hr class="divider">

                <div>
                    <button class="submit" type="submit">Sign In</button>
                </div>

                <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>

            </div>
        </div>
    </form>
</body>

</html>
